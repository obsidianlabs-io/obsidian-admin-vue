name: Frontend Docs Site

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: frontend-docs-site
  cancel-in-progress: true

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup frontend toolchain
        uses: ./.github/actions/setup-frontend

      - name: Build docs site
        env:
          VITEPRESS_BASE: /obsidian-admin-vue/
        run: pnpm docs:build

      - name: Build demo preview
        env:
          VITE_BASE_URL: /obsidian-admin-vue/preview/
        run: pnpm build:demo

      - name: Assemble Pages bundle
        run: |
          rm -rf .pages-dist
          mkdir -p .pages-dist/preview
          cp -R docs/.vitepress/dist/. .pages-dist
          cp -R demo-dist/. .pages-dist/preview

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-dist

  deploy-docs:
    if: github.event_name != 'pull_request'
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
