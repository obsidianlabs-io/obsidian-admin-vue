name: Frontend Contract Gate

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  contract-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BACKEND_REPO: ${{ vars.BACKEND_REPO || 'obsidianlabs-io/obsidian-admin-laravel' }}
      BACKEND_REPO_TOKEN: ${{ secrets.BACKEND_REPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Checkout backend contract repo (with token)
        if: ${{ env.BACKEND_REPO_TOKEN != '' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ${{ env.BACKEND_REPO }}
          token: ${{ env.BACKEND_REPO_TOKEN }}
          path: backend
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout backend contract repo (public)
        if: ${{ env.BACKEND_REPO_TOKEN == '' }}
        run: git clone --depth=1 https://github.com/${{ env.BACKEND_REPO }}.git backend

      - name: Link backend for api type scripts
        run: |
          ln -sfn "$GITHUB_WORKSPACE/backend" "$GITHUB_WORKSPACE/../obsidian-admin-laravel"
          test -f "$GITHUB_WORKSPACE/../obsidian-admin-laravel/docs/openapi.yaml"

      - name: Setup frontend toolchain
        uses: ./.github/actions/setup-frontend

      - name: API client contract snapshot gate
        run: pnpm contract:check

      - name: Frontend/Backend contract compatibility gate
        run: node scripts/api-backend-compat.mjs --check --backend=backend/docs/api-contract.snapshot

      - name: Type check
        run: pnpm typecheck:api
