name: Frontend Supply Chain

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294

  npm-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup frontend toolchain
        uses: ./.github/actions/setup-frontend

      - name: Audit production dependencies
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: pnpm audit --prod --audit-level=high

  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup frontend toolchain
        uses: ./.github/actions/setup-frontend

      - name: Generate runtime SBOM
        run: |
          mkdir -p build
          pnpm dlx @cyclonedx/cdxgen \
            -o build/frontend-sbom.cyclonedx.json \
            --no-install-deps \
            --spec-version 1.6 \
            --profile generic \
            .

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-sbom-cyclonedx
          path: build/frontend-sbom.cyclonedx.json
          if-no-files-found: error

  attest-sbom:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: sbom
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-sbom-cyclonedx
          path: build

      - name: Attest frontend SBOM artifact
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: build/frontend-sbom.cyclonedx.json

  attest-dist:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup frontend toolchain
        uses: ./.github/actions/setup-frontend

      - name: Build dist artifact
        run: pnpm build

      - name: Attest frontend dist
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: dist/**
