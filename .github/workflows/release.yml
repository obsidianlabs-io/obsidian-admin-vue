name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup frontend toolchain
        uses: ./.github/actions/setup-frontend

      - name: Validate release pairing
        run: pnpm release:pairing "${GITHUB_REF_NAME}"

      - name: Prepare release notes
        run: |
          VERSION_TAG="${GITHUB_REF_NAME}"
          VERSION="${VERSION_TAG#v}"
          RELEASE_NOTE_PATH="docs/releases/${VERSION_TAG}.md"

          if [ -f "${RELEASE_NOTE_PATH}" ]; then
            cp "${RELEASE_NOTE_PATH}" RELEASE_NOTES.md
            exit 0
          fi

          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {capture=1; print; next}
            capture && $0 ~ "^## \\[" {exit}
            capture {print}
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            {
              echo "## ${GITHUB_REF_NAME}"
              echo
              echo "Release notes fallback. See CHANGELOG.md for details, or add ${RELEASE_NOTE_PATH}."
            } > RELEASE_NOTES.md
          fi

      - name: Build release artifacts
        env:
          VITEPRESS_BASE: /obsidian-admin-vue/
          VITE_BASE_URL: /obsidian-admin-vue/preview/
        run: |
          pnpm build
          pnpm docs:build
          pnpm build:demo
          pnpm pages:bundle

      - name: Package release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p build/release
          tar -czf "build/release/obsidian-admin-vue-${VERSION}-dist.tar.gz" -C dist .
          tar -czf "build/release/obsidian-admin-vue-${VERSION}-demo-preview.tar.gz" -C demo-dist .
          tar -czf "build/release/obsidian-admin-vue-${VERSION}-pages-bundle.tar.gz" -C .pages-dist .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          append_body: false
          generate_release_notes: false
          make_latest: true
          files: |
            build/release/obsidian-admin-vue-*.tar.gz
