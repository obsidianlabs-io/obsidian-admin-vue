name: Frontend Quality Gate

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup frontend toolchain
        uses: ./.github/actions/setup-frontend

      - name: Quality checks
        run: pnpm check

      - name: Strict TypeScript check
        run: pnpm typecheck:strict

      - name: Unit tests
        run: pnpm test:unit

      - name: Vue-layer tests (Vitest)
        run: pnpm test:vue

      - name: Production build
        run: pnpm build

  e2e:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Detect e2e-relevant changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        with:
          filters: |
            e2e:
              - 'src/**'
              - 'tests/e2e/**'
              - 'playwright.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.ts'
              - '.github/workflows/linter.yml'

      - name: Skip e2e (no relevant changes)
        if: steps.changes.outputs.e2e != 'true'
        run: echo "No e2e-relevant file changes; skipping e2e."

      - name: Setup frontend toolchain
        if: steps.changes.outputs.e2e == 'true'
        uses: ./.github/actions/setup-frontend

      - name: Cache Playwright browsers
        if: steps.changes.outputs.e2e == 'true'
        id: playwright-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser
        if: steps.changes.outputs.e2e == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        if: steps.changes.outputs.e2e == 'true'
        run: pnpm test:e2e
