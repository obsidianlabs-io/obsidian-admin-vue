name: Full-Stack Pairing

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "41 4 * * *"
  workflow_dispatch:

jobs:
  pairing-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      BACKEND_REPO: ${{ vars.BACKEND_REPO || 'obsidianlabs-io/obsidian-admin-laravel' }}
      BACKEND_REPO_REF: ${{ vars.BACKEND_REPO_REF || 'main' }}
      BACKEND_REPO_TOKEN: ${{ secrets.BACKEND_REPO_TOKEN }}
      COMPOSE_PROJECT_NAME: obsidian-fullstack
    steps:
      - name: Checkout frontend
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Detect full-stack relevant changes
        if: github.event_name == 'pull_request'
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        with:
          filters: |
            pairing:
              - 'src/**'
              - 'tests/e2e/**'
              - 'playwright*.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.env.test'
              - '.github/workflows/full-stack-pairing.yml'
              - 'docs/full-stack-evaluation.md'
              - 'docs/testing.md'

      - name: Skip pairing smoke (no relevant changes)
        if: github.event_name == 'pull_request' && steps.changes.outputs.pairing != 'true'
        run: echo 'No full-stack relevant changes; skipping pairing smoke.'

      - name: Checkout backend repo (with token)
        if: (github.event_name != 'pull_request' || steps.changes.outputs.pairing == 'true') && env.BACKEND_REPO_TOKEN != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ env.BACKEND_REPO }}
          ref: ${{ env.BACKEND_REPO_REF }}
          token: ${{ env.BACKEND_REPO_TOKEN }}
          path: backend
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout backend repo (public)
        if: (github.event_name != 'pull_request' || steps.changes.outputs.pairing == 'true') && env.BACKEND_REPO_TOKEN == ''
        run: git clone --depth=1 --branch "${BACKEND_REPO_REF}" "https://github.com/${BACKEND_REPO}.git" backend

      - name: Setup frontend toolchain
        if: github.event_name != 'pull_request' || steps.changes.outputs.pairing == 'true'
        uses: ./.github/actions/setup-frontend

      - name: Cache Playwright browsers
        if: github.event_name != 'pull_request' || steps.changes.outputs.pairing == 'true'
        id: playwright-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser
        if: (github.event_name != 'pull_request' || steps.changes.outputs.pairing == 'true') && steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Prepare backend environment
        if: github.event_name != 'pull_request' || steps.changes.outputs.pairing == 'true'
        working-directory: backend
        run: |
          cp .env.example .env
          python3 - <<'PY'
          from pathlib import Path
          env = Path('.env')
          text = env.read_text()
          replacements = {
              'APP_ENV': 'testing',
              'APP_URL': 'http://127.0.0.1:8080',
              'APP_DEBUG': 'true',
          }
          lines = []
          for line in text.splitlines():
              key = line.split('=', 1)[0]
              if key in replacements:
                  lines.append(f'{key}={replacements[key]}')
              else:
                  lines.append(line)
          env.write_text('\n'.join(lines) + '\n')
          PY

      - name: Start backend dependencies
        if: github.event_name != 'pull_request' || steps.changes.outputs.pairing == 'true'
        working-directory: backend
        run: |
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml up -d mysql redis

      - name: Wait for backend dependencies
        if: github.event_name != 'pull_request' || steps.changes.outputs.pairing == 'true'
        working-directory: backend
        run: |
          for _ in $(seq 1 60); do
            if docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml exec -T mysql mysqladmin ping -h localhost -uroot -proot --silent >/dev/null 2>&1 \
              && docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml exec -T redis redis-cli ping >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo 'Backend dependencies did not become ready in time.' >&2
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml ps || true
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml logs --no-color mysql redis || true
          exit 1

      - name: Install backend dependencies
        if: github.event_name != 'pull_request' || steps.changes.outputs.pairing == 'true'
        working-directory: backend
        run: |
          timeout 10m docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml run --rm composer

      - name: Build and start backend app
        if: github.event_name != 'pull_request' || steps.changes.outputs.pairing == 'true'
        working-directory: backend
        run: |
          timeout 10m docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml up -d --build --no-deps app nginx

      - name: Initialize backend application
        if: github.event_name != 'pull_request' || steps.changes.outputs.pairing == 'true'
        working-directory: backend
        run: |
          app_ready=false
          for _ in $(seq 1 60); do
            if docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml exec -T app php -v >/dev/null 2>&1; then
              app_ready=true
              break
            fi
            sleep 2
          done
          if [ "$app_ready" != "true" ]; then
            echo 'Backend app container did not become ready in time.' >&2
            docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml ps || true
            docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml logs --no-color composer app nginx mysql redis || true
            exit 1
          fi
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml exec -T app php artisan key:generate --force
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml exec -T app php artisan migrate:fresh --seed --force

      - name: Wait for backend live health
        if: github.event_name != 'pull_request' || steps.changes.outputs.pairing == 'true'
        run: |
          for _ in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:8080/api/health/live >/tmp/fullstack-health.json; then
              cat /tmp/fullstack-health.json
              exit 0
            fi
            sleep 2
          done
          echo 'Backend live health probe did not become ready in time.' >&2
          exit 1

      - name: Run full-stack pairing smoke
        if: github.event_name != 'pull_request' || steps.changes.outputs.pairing == 'true'
        run: pnpm test:fullstack

      - name: Dump backend diagnostics
        if: failure() && (github.event_name != 'pull_request' || steps.changes.outputs.pairing == 'true')
        working-directory: backend
        run: |
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml ps || true
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml logs --no-color composer app nginx mysql redis || true
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml exec -T app php artisan about --only=environment || true
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml exec -T app sh -lc 'ls -la storage/logs && tail -n 200 storage/logs/laravel.log' || true

      - name: Tear down backend stack
        if: always() && (github.event_name != 'pull_request' || steps.changes.outputs.pairing == 'true')
        working-directory: backend
        run: docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.dev.yml down -v
